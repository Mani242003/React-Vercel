name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Docker Image Name"
        required: true
      image_tag:
        description: "Version Tag (v1, v2...)"
        required: true
      docker_username:
        description: "Docker Username"
        required: true
      docker_password:
        description: "Docker Password/Token"
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Inputs
        run: |
          echo "🔍 Validating inputs..."

          [ -z "${{ github.event.inputs.image_name }}" ] && echo "❌ image_name missing" && exit 1
          [ -z "${{ github.event.inputs.image_tag }}" ] && echo "❌ image_tag missing" && exit 1
          [ -z "${{ github.event.inputs.docker_username }}" ] && echo "❌ docker_username missing" && exit 1
          [ -z "${{ github.event.inputs.docker_password }}" ] && echo "❌ docker_password missing" && exit 1

          echo "✅ Validation successful"

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Inputs
        run: |
          echo "📦 Image: ${{ github.event.inputs.docker_username }}/${{ github.event.inputs.image_name }}"
          echo "🏷 Version: ${{ github.event.inputs.image_tag }}"

     
