name: Deploy to Vercel

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: "Docker Image Name"
        required: true
      image_tag:
        description: "Image Version (IMPORTANT)"
        required: true
      docker_username:
        description: "Docker Username"
        required: true
      vercel_token:
        description: "Vercel Token"
        required: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Inputs
        run: |
          echo "🔍 Validating inputs..."

          [ -z "${{ github.event.inputs.image_name }}" ] && echo "❌ image_name missing" && exit 1
          [ -z "${{ github.event.inputs.image_tag }}" ] && echo "❌ image_tag missing" && exit 1
          [ -z "${{ github.event.inputs.docker_username }}" ] && echo "❌ docker_username missing" && exit 1
          [ -z "${{ github.event.inputs.vercel_token }}" ] && echo "❌ vercel_token missing" && exit 1

          echo "✅ Validation successful"

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Show Deployment Info
        run: |
          echo "🚀 Deploying version..."
          echo "📦 Image: ${{ github.event.inputs.docker_username }}/${{ github.event.inputs.image_name }}"
          echo "🏷 Version: ${{ github.event.inputs.image_tag }}"

      - name: Pull Image
        run: |
          set -e
          echo "📥 Pulling image from Docker Hub..."
          docker pull \
          ${{ github.event.inputs.docker_username }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}
          echo "✅ Image pulled"

      - name: Extract dist
        run: |
          set -e
          echo "📦 Extracting build files..."

          docker create --name temp \
          ${{ github.event.inputs.docker_username }}/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }}

          docker cp temp:/app/dist ./dist
          docker rm temp

          echo "✅ Extraction complete"

      - name: Verify dist
        run: |
          echo "📁 Checking dist..."
          ls -la dist || (echo "❌ dist not found" && exit 1)

      - name: Deploy to Vercel
        run: |
          set -e
          echo "🚀 Deploying to Vercel..."

          npm install -g vercel

        vercel deploy --prod \
        --name my-app \
        --token=${{ github.event.inputs.vercel_token }} \
        --yes

          echo "✅ Deployment SUCCESS ✅"
